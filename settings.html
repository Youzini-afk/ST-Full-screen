<div class="st-fullscreen-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>🖥️ 全屏模式</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container flexFlowColumn">
                <label class="checkbox_label" for="fullscreen_css_enabled" title="隐藏 SillyTavern 顶栏和侧边面板，让聊天区域铺满浏览器窗口">
                    <input id="fullscreen_css_enabled" type="checkbox" />
                    <span>启用 CSS 布局全屏</span>
                    <small>隐藏面板，聊天区铺满窗口</small>
                </label>
                <label class="checkbox_label" for="fullscreen_native_enabled" title="调用浏览器 Fullscreen API，隐藏浏览器标题栏和系统任务栏">
                    <input id="fullscreen_native_enabled" type="checkbox" />
                    <span>启用原生全屏</span>
                    <small>隐藏浏览器/系统 UI，占满整个屏幕</small>
                </label>
                <label class="checkbox_label" for="fullscreen_persist_on_visibility" title="移动端切换小窗或后台后，返回时自动重新进入原生全屏">
                    <input id="fullscreen_persist_on_visibility" type="checkbox" />
                    <span>切换小窗时保持全屏</span>
                    <small>页面恢复可见时自动重新请求全屏</small>
                </label>
                <label class="checkbox_label" for="fullscreen_shortcut_enabled" title="启用 Ctrl+Shift+F 快捷键切换全屏">
                    <input id="fullscreen_shortcut_enabled" type="checkbox" />
                    <span>键盘快捷键</span>
                    <small>Ctrl+Shift+F 切换全屏</small>
                </label>
                <hr>
                <label class="checkbox_label" for="fullscreen_show_in_wand" title="在魔法棒菜单中显示全屏按钮">
                    <input id="fullscreen_show_in_wand" type="checkbox" />
                    <span>魔法棒菜单按钮</span>
                    <small>在魔法棒下拉菜单中注入全屏选项</small>
                </label>
                <label class="checkbox_label" for="fullscreen_show_in_sendform" title="在输入框左侧（魔法棒旁边）显示独立全屏按钮">
                    <input id="fullscreen_show_in_sendform" type="checkbox" />
                    <span>输入框旁按钮</span>
                    <small>在魔法棒右边显示独立全屏图标</small>
                </label>
                <label class="checkbox_label" for="fullscreen_show_in_topbar" title="在顶栏（更改背景图片左边）显示全屏按钮">
                    <input id="fullscreen_show_in_topbar" type="checkbox" />
                    <span>顶栏按钮</span>
                    <small>在更改背景图片按钮左边显示全屏图标</small>
                </label>
            </div>
        </div>
    </div>
</div>
